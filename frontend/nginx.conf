# Minimal nginx reverse proxy per frontend A2UI

events {
    worker_connections 256;
}

http {
    server {
        listen 3000;
        server_name _;

        # Serve static files (HTML, CSS, JS)
        root /app;
        index index.html;

        # Static files
        location / {
            try_files $uri $uri/ =404;
        }

        # Proxy /chat to backend service
        location /chat {
            proxy_pass http://backend:8000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header Content-Type application/json;
        }

        # Proxy /health to backend
        location /health {
            proxy_pass http://backend:8000;
        }

        # Proxy /agents to backend
        location /agents {
            proxy_pass http://backend:8000;
        }

        # Proxy /log-query to backend (cost tracking)
        location /log-query {
            proxy_pass http://backend:8000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header Content-Type application/json;
        }

        # Proxy /stats to backend (session statistics)
        location /stats {
            proxy_pass http://backend:8000;
        }
    }
}